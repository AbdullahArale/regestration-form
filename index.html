<!DOCTYPE html>
<html>
    <title>
        registration form
</title>
<link rel="stylesheet" href="stylesheet.css">
<body>
<div class="container">
<div class="title">Registeration</div>
<form action="#">
    <div class="user">
        <div class="input-box">
            <span class details>full-name:</span>
            <input type="text" placeholder="Enter your name" required>
        </div>
        <div class="input-box">
            <span class details>Username:</span>
            <input type="text" placeholder="Enter your username" required>
        </div>
        <div class="input-box">
            <span class details>Email</span>
            <input type="text" placeholder="Enter your email" required>
            
        </div>
        <div class="input-box">
            <span class details>Phone-number:</span>
            <input type="text" placeholder="000-000-000" required>
            
        </div>
        <div class="input-box">
            <span class details>Password</span>
            <input type="password" placeholder="Enter password" required>
            
        </div>
        <div class="input-box">
            <span class details>Conform password:</span>
            <input type="text" placeholder="Enter the password again" required>
        </div>
        <div class="gender-detail">
            <input type="radio" name="gender" id="dot-1">
            <input type="radio" name="gender" id="dot-2">
            <div class="gender-title">Gender:</div>
            <div class="cat">
                <label for="dot-1">
                    <span class="dot one"></span>
                    <span class="gender">Male</span>
                </label>
                <label for="dot-2">
                    <span class="dot two"></span>
                    <span class="gender">Female</span>
                </label>
            </div>
        </div>
    </div>
    <div class="button">
        <input type="submit" value="Register">
    </div>
</form>
</div>
    

</body>
</html>
